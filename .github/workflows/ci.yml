name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "codex/**"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Check line endings (LF only)
        shell: bash
        run: |
          if git grep --cached -I -n $'\r' -- .; then
            echo "CRLF line endings detected in tracked text files."
            exit 1
          else
            echo "Line ending check passed (LF only)."
          fi

      - name: Black check
        run: black --check src tests

      - name: Flake8
        run: flake8 src tests

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run non-hardware tests
        run: pytest -q -m "not full_hw and not rsa_only"

      - name: Compile check
        run: python -m compileall src tests
